name: Submit a plugin
description: Add your Workspace plugin to the registry — automated tests run on submission.
title: "[plugin] "
labels: ["plugin-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Link your plugin's **GitHub repository** (or the plugin folder inside it).
        The registry only stores this link plus the tested commit — your code stays in your repo.
        Automated tests run immediately; you'll get a comment with the result.
  - type: input
    id: repo-url
    attributes:
      label: Plugin repository URL
      description: e.g. github.com/you/my-plugin or github.com/you/monorepo/tree/main/plugins/my-plugin
      placeholder: github.com/you/my-plugin
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: The repo is public and contains manifest.json (+ entry .jsx, or theme.css for themes)
          required: true
        - label: I understand plugins run with full app privileges and users see a consent screen listing my declared permissions
          required: true
